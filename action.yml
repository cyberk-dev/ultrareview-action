name: 'Ultrareview'
description: 'AI-powered code review with multi-step agent loop. Posts line-level comments on PRs.'
author: 'cyberk-dev'

branding:
  icon: 'search'
  color: 'purple'

inputs:
  ai-api-key:
    description: 'API key for AI proxy (cliproxy)'
    required: true
  ai-base-url:
    description: 'AI proxy base URL'
    required: false
    default: 'https://api.openai.com'
  analysis-model:
    description: 'Model for deep analysis'
    required: false
    default: 'gpt-5.4'
  judge-model:
    description: 'Model for bug judging (should differ from analysis model)'
    required: false
    default: 'gpt-5.2'
  classify-model:
    description: 'Model for bug classification'
    required: false
    default: 'gpt-5.4-mini'
  min-confidence:
    description: 'Minimum confidence threshold (0-1)'
    required: false
    default: '0.7'
  min-judge-score:
    description: 'Minimum judge score threshold (0-1)'
    required: false
    default: '0.6'
  timeout-minutes:
    description: 'Pipeline timeout in minutes (default 10, set 30 for thorough analysis)'
    required: false
    default: '10'
  feedback:
    description: 'Enable self-improving feedback loop (saves review data for prompt optimization)'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install ultrareview dependencies
      shell: bash
      run: bun install --cwd ${{ github.action_path }}

    - name: Run Ultrareview
      shell: bash
      run: bun run ${{ github.action_path }}/src/github/action-entry.ts
      env:
        GITHUB_TOKEN: ${{ github.token }}
        AI_API_KEY: ${{ inputs.ai-api-key }}
        AI_BASE_URL: ${{ inputs.ai-base-url }}
        AI_ANALYSIS_MODEL: ${{ inputs.analysis-model }}
        AI_JUDGE_MODEL: ${{ inputs.judge-model }}
        AI_CLASSIFY_MODEL: ${{ inputs.classify-model }}
        FILTER_MIN_CONFIDENCE: ${{ inputs.min-confidence }}
        FILTER_MIN_JUDGE_SCORE: ${{ inputs.min-judge-score }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO_OWNER: ${{ github.repository_owner }}
        REPO_NAME: ${{ github.event.repository.name }}
        FEEDBACK_ENABLED: ${{ inputs.feedback }}
        FEEDBACK_DIR: ${{ github.action_path }}/benchmark/feedback
        GITHUB_EVENT_ACTION: ${{ github.event.action }}
