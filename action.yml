name: 'Ultrareview'
description: 'AI-powered code review with multi-step agent loop and optional GitNexus graph context. Posts line-level comments on PRs.'
author: 'cyberk-dev'

branding:
  icon: 'search'
  color: 'purple'

inputs:
  ai-api-key:
    description: 'API key for AI proxy (cliproxy)'
    required: true
  ai-base-url:
    description: 'AI proxy base URL'
    required: false
    default: 'https://api.openai.com'
  analysis-model:
    description: 'Model for deep analysis'
    required: false
    default: 'gpt-5.4'
  judge-model:
    description: 'Model for bug judging (should differ from analysis model)'
    required: false
    default: 'gpt-5.2'
  classify-model:
    description: 'Model for bug classification'
    required: false
    default: 'gpt-5.4-mini'
  min-confidence:
    description: 'Minimum confidence threshold (0-1)'
    required: false
    default: '0.7'
  min-judge-score:
    description: 'Minimum judge score threshold (0-1)'
    required: false
    default: '0.6'
  timeout-minutes:
    description: 'Pipeline timeout in minutes (default 10, set 30 for thorough analysis)'
    required: false
    default: '10'
  feedback:
    description: 'Enable self-improving feedback loop (saves review data for prompt optimization)'
    required: false
    default: 'true'
  gitnexus-enabled:
    description: 'Enable GitNexus code graph context (requires npx gitnexus in PATH)'
    required: false
    default: 'true'
  gitnexus-secret-scan:
    description: 'Scan .gitnexus/ index for leaked secrets after indexing (fails with warning, never blocks PR)'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Cache GitNexus index
      if: inputs.gitnexus-enabled == 'true'
      uses: actions/cache@v4
      with:
        path: .gitnexus
        # key: PR HEAD sha (stable per push on same PR); falls back to github.sha on push events
        key: gitnexus-v1-${{ github.repository }}-${{ github.event.pull_request.head.sha || github.sha }}
        restore-keys: |
          gitnexus-v1-${{ github.repository }}-${{ github.base_ref }}-
          gitnexus-v1-${{ github.repository }}-

    - name: Index GitNexus (incremental)
      if: inputs.gitnexus-enabled == 'true'
      shell: bash
      continue-on-error: true
      run: |
        # Warm run reuses cached .gitnexus/; cold run does full index (~1-5 min).
        npx gitnexus analyze --incremental || {
          echo "::warning::GitNexus index failed — ultrareview will run without graph context"
          exit 0
        }
        echo "::notice::GitNexus index size: $(du -sh .gitnexus 2>/dev/null | cut -f1)"

    - name: Scan GitNexus index for leaked secrets
      if: inputs.gitnexus-enabled == 'true' && inputs.gitnexus-secret-scan == 'true'
      shell: bash
      continue-on-error: true
      run: |
        # Belt-and-suspenders check: warn if any indexed file contains secret-like patterns.
        # Never blocks the PR — emits a warning annotation only.
        if [ -d .gitnexus ]; then
          HITS=$(grep -rl "API_KEY\|SECRET\|TOKEN\|PRIVATE_KEY" .gitnexus/ 2>/dev/null | head -5 || true)
          if [ -n "$HITS" ]; then
            echo "::warning::GitNexus index may contain secret-like patterns. Review these files:"
            echo "$HITS" | while read -r f; do echo "::warning file=$f::Potential secret pattern found in GitNexus index"; done
          fi
        fi

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Install ultrareview dependencies
      shell: bash
      run: bun install --cwd ${{ github.action_path }}

    - name: Run Ultrareview
      shell: bash
      run: bun run ${{ github.action_path }}/src/github/action-entry.ts
      env:
        GITHUB_TOKEN: ${{ github.token }}
        AI_API_KEY: ${{ inputs.ai-api-key }}
        AI_BASE_URL: ${{ inputs.ai-base-url }}
        AI_ANALYSIS_MODEL: ${{ inputs.analysis-model }}
        AI_JUDGE_MODEL: ${{ inputs.judge-model }}
        AI_CLASSIFY_MODEL: ${{ inputs.classify-model }}
        FILTER_MIN_CONFIDENCE: ${{ inputs.min-confidence }}
        FILTER_MIN_JUDGE_SCORE: ${{ inputs.min-judge-score }}
        PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        REPO_OWNER: ${{ github.repository_owner }}
        REPO_NAME: ${{ github.event.repository.name }}
        FEEDBACK_ENABLED: ${{ inputs.feedback }}
        FEEDBACK_DIR: ${{ github.action_path }}/benchmark/feedback
        GITHUB_EVENT_ACTION: ${{ github.event.action }}
        GITNEXUS_ENABLED: ${{ inputs.gitnexus-enabled }}
