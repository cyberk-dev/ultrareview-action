# Copy this file to your repo at .github/workflows/ultrareview.yml
name: Ultrareview
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # allow headroom for cold GitNexus index + large PRs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for git diff base..head — do not remove

      # GitNexus cache — saves 1-5 min on warm runs by reusing the prior index.
      # Cache is scoped to PR HEAD sha (stable per push within the same PR).
      # Restore-keys ladder: exact → same base branch → same repo (broad fallback).
      - name: Cache GitNexus index
        uses: actions/cache@v4
        with:
          path: .gitnexus
          key: gitnexus-v1-${{ github.repository }}-${{ github.event.pull_request.head.sha || github.sha }}
          restore-keys: |
            gitnexus-v1-${{ github.repository }}-${{ github.base_ref }}-
            gitnexus-v1-${{ github.repository }}-

      # Incremental index: reuses cached .gitnexus/ when present (warm run <30s).
      # Cold run (no cache) performs full indexing (~1-5 min depending on repo size).
      # Failure is non-fatal — ultrareview continues without graph context.
      - name: Index GitNexus (incremental)
        continue-on-error: true
        run: |
          npx gitnexus analyze --incremental || {
            echo "::warning::GitNexus index failed — ultrareview will run without graph context"
            exit 0
          }
          echo "::notice::GitNexus index size: $(du -sh .gitnexus 2>/dev/null | cut -f1)"

      # Optional but recommended: warn if indexed files contain secret-like patterns.
      # Never blocks the PR — emits GitHub warning annotations only.
      # Disable by removing this step or setting GITNEXUS_SECRET_SCAN=false.
      - name: Scan GitNexus index for leaked secrets
        continue-on-error: true
        run: |
          if [ -d .gitnexus ]; then
            HITS=$(grep -rl "API_KEY\|SECRET\|TOKEN\|PRIVATE_KEY" .gitnexus/ 2>/dev/null | head -5 || true)
            if [ -n "$HITS" ]; then
              echo "::warning::GitNexus index may contain secret-like patterns. Review these files:"
              echo "$HITS" | while read -r f; do echo "::warning file=$f::Potential secret pattern found"; done
            fi
          fi

      - uses: cyberk-dev/ultrareview-action@v0.1.0  # pin to a tagged release
        with:
          ai-api-key: ${{ secrets.AI_API_KEY }}
          # Optional overrides:
          # ai-base-url: https://your-proxy.example.com
          # analysis-model: gpt-5.4
          # judge-model: gpt-5.2
          # min-confidence: '0.7'
          # min-judge-score: '0.6'
          # gitnexus-enabled: 'true'    # set to 'false' to disable GitNexus entirely
