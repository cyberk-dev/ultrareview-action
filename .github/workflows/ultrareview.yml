name: Ultrareview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./
        with:
          ai-api-key: ${{ secrets.AI_API_KEY }}
          ai-base-url: ${{ secrets.AI_BASE_URL }}
          analysis-model: gpt-5.4
          judge-model: gpt-5.2
          classify-model: gpt-5.4-mini
