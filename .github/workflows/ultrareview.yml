name: Ultrareview

on:
  pull_request:
    types: [opened, reopened, closed]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Run on: PR opened/reopened, OR "/review" comment on a PR
    if: >-
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '/review')
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./
        with:
          ai-api-key: ${{ secrets.AI_API_KEY }}
          ai-base-url: ${{ secrets.AI_BASE_URL }}
          analysis-model: gpt-5.4
          judge-model: gpt-5.2
          classify-model: gpt-5.4-mini
        env:
          # For issue_comment trigger, PR number comes from issue context
          PR_NUMBER_OVERRIDE: ${{ github.event.issue.number }}
