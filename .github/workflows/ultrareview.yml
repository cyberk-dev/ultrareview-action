name: Ultrareview

on:
  pull_request:
    types: [opened, reopened, closed]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Run on: PR opened/reopened, OR "/review" comment on a PR
    if: >-
      github.event_name == 'pull_request' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '/review')
      )

    steps:
      - name: React to comment
        if: github.event_name == 'issue_comment'
        shell: bash
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=eyes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Get PR head ref
        id: pr-ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            PR_NUM="${{ github.event.issue.number }}"
            HEAD_SHA=$(gh api repos/${{ github.repository }}/pulls/$PR_NUM --jq '.head.sha')
            echo "ref=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr-ref.outputs.ref }}

      - uses: ./
        with:
          ai-api-key: ${{ secrets.AI_API_KEY }}
          ai-base-url: ${{ secrets.AI_BASE_URL }}
          analysis-model: gpt-5.4
          judge-model: gpt-5.2
          classify-model: gpt-5.4-mini
        env:
          PR_NUMBER_OVERRIDE: ${{ github.event.issue.number }}
